name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Unit tests
        run: cargo test

      - name: Install test shells
        run: |
          sudo apt-get update -q
          sudo apt-get install -y dash bash ksh zsh csh

      - name: Integration tests (ttest.sh)
        run: |
          chmod +x test/ttest.sh
          test/ttest.sh ./target/release/rshc

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies
        run: cargo audit

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Unit tests
        run: cargo test
      - name: Quick smoke test
        run: |
          echo '#!/bin/bash
          echo "hello $@"' > /tmp/test.sh
          chmod +x /tmp/test.sh
          ./target/release/rshc -f /tmp/test.sh -o /tmp/test_bin
          out=$(/tmp/test_bin world)
          [ "$out" = "hello world" ] && echo "PASSED" || (echo "FAILED: $out" && exit 1)
